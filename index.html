<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모의고사 · 문제와 해설</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1a17;
    --ink-soft:#5c574e;
    --paper:#f6f3ec;
    --card:#fffdf8;
    --line:#e3ddd0;
    --rule:#cfc7b6;
    --accent:#9a2a2a;       /* 정답지 빨강 계열 */
    --accent-soft:#f0e0db;
    --ok:#2f6b4f;
    --shadow:0 1px 0 #fff inset, 0 8px 24px -16px rgba(40,30,20,.4);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #fbf8f1 0%, var(--paper) 60%) fixed;
    color:var(--ink);
    font-family:"IBM Plex Sans KR",system-ui,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
  .serif{font-family:"Newsreader",Georgia,serif}

  /* ---- top bar ---- */
  .topbar{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:12px;padding:6px 2px 18px;border-bottom:1px solid var(--line);margin-bottom:24px;
  }
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand .eyebrow{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:600;
  }
  .brand h1{
    font-family:"Newsreader",serif;font-weight:600;font-size:26px;margin:0;letter-spacing:-.01em;
  }
  .whoami{font-size:13px;color:var(--ink-soft)}
  .whoami b{color:var(--ink)}
  .logout{
    background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;
    text-decoration:underline;text-underline-offset:3px;padding:0;margin-left:10px;font-family:inherit;
  }

  /* ---- cards / list ---- */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px;margin-bottom:14px;
  }
  .list-row{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:16px 18px;margin-bottom:12px;cursor:pointer;
    font-family:inherit;font-size:15px;color:var(--ink);transition:transform .12s ease,border-color .12s ease;
  }
  .list-row:hover{transform:translateY(-1px);border-color:var(--rule)}
  .badge{
    flex:none;width:44px;height:44px;border-radius:10px;display:grid;place-items:center;
    background:var(--accent-soft);color:var(--accent);font-family:"Newsreader",serif;font-weight:600;font-size:18px;
  }
  .list-row .meta{display:flex;flex-direction:column;gap:1px;flex:1}
  .list-row .meta .t{font-weight:600}
  .list-row .meta .s{font-size:12.5px;color:var(--ink-soft)}
  .chev{color:var(--rule);font-size:18px}

  /* ---- question number grid ---- */
  .qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:10px;margin-top:6px}
  .qbtn{
    aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:var(--card);
    cursor:pointer;font-family:"Newsreader",serif;font-size:18px;font-weight:600;color:var(--ink);
    box-shadow:var(--shadow);transition:transform .1s ease,color .1s ease,border-color .1s ease;
  }
  .qbtn:hover{transform:translateY(-1px);color:var(--accent);border-color:var(--accent)}
  .qbtn .tag{display:block;font-family:"IBM Plex Sans KR";font-size:9px;font-weight:500;color:var(--ink-soft);margin-top:2px}

  /* ---- section label ---- */
  .sect-label{
    display:flex;align-items:center;gap:10px;margin:22px 2px 12px;
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;
  }
  .sect-label::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---- question view ---- */
  .qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .qhead .num{font-family:"Newsreader",serif;font-size:30px;font-weight:600;color:var(--accent);line-height:1}
  .qhead .pts{font-size:12px;color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;padding:2px 10px}
  .passage{font-size:15.5px;white-space:pre-wrap;text-align:justify;word-break:break-word;hyphens:auto;text-indent:1.1em}
  /* 해설 내부 본문은 들여쓰기 제외 */
  .explain-body .passage{text-indent:0}
  .choices{list-style:none;margin:16px 0 0;padding:0;counter-reset:c}
  .choices li{
    padding:9px 12px;border:1px solid transparent;border-radius:9px;margin-bottom:4px;display:flex;gap:10px;align-items:flex-start;
  }
  .choices li::before{
    counter-increment:c;content:counter(c);flex:none;
    width:22px;height:22px;border:1px solid var(--rule);border-radius:50%;
    display:grid;place-items:center;font-size:12px;color:var(--ink-soft);
  }

  /* ---- explanation toggle ---- */
  .explain-wrap{margin-top:22px;border-top:1px dashed var(--rule);padding-top:18px}
  .explain-btn{
    display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;
    background:var(--accent);color:#fff;border:none;border-radius:999px;padding:9px 18px;
  }
  .explain-btn:hover{background:#812020}
  .explain-body{display:none;margin-top:16px;background:#fbf6ef;border:1px solid var(--line);border-radius:12px;padding:18px}
  .explain-body.open{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .ans-line{display:flex;align-items:center;gap:10px;font-size:15px;margin-bottom:10px;
    padding-bottom:10px;border-bottom:1px solid var(--line)}
  .ans-line .k{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .ans-line .v{font-family:"Newsreader",serif;font-size:20px;font-weight:600;color:var(--ok)}

  /* ---- back link ---- */
  .back{
    background:none;border:none;color:var(--ink-soft);cursor:pointer;font-family:inherit;font-size:13.5px;
    padding:0;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;
  }
  .back:hover{color:var(--accent)}

  /* ---- login ---- */
  .login-screen{min-height:72vh;display:grid;place-items:center}
  .login-card{
    width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);padding:30px 26px;
  }
  .login-card .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .login-card h2{font-family:"Newsreader",serif;font-weight:600;font-size:24px;margin:6px 0 4px}
  .login-card p.sub{font-size:13px;color:var(--ink-soft);margin:0 0 22px}
  label{display:block;font-size:12.5px;color:var(--ink-soft);margin:0 0 6px;font-weight:500}
  input{
    width:100%;padding:11px 13px;border:1px solid var(--rule);border-radius:10px;background:#fffefb;
    font-family:inherit;font-size:15px;color:var(--ink);margin-bottom:16px;
  }
  input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .btn-primary{
    width:100%;padding:12px;border:none;border-radius:10px;background:var(--ink);color:#fff;
    font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
  }
  .btn-primary:hover{background:#000}
  .err{color:var(--accent);font-size:13px;min-height:18px;margin-top:4px}

  .empty{color:var(--ink-soft);font-size:14px;text-align:center;padding:40px 0}
  .hidden{display:none !important}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============== 로그인 화면 ============== -->
  <section id="view-login" class="login-screen">
    <div class="login-card">
      <div class="eyebrow">Mock Exam Archive</div>
      <h2>모의고사 열람</h2>
      <p class="sub">이름과 핸드폰 뒤 4자리로 입장하세요.</p>
      <label for="in-name">이름</label>
      <input id="in-name" type="text" autocomplete="name" placeholder="홍길동">
      <label for="in-pin">PIN (핸드폰 뒤 4자리)</label>
      <input id="in-pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="••••">
      <button class="btn-primary" id="btn-login">입장하기</button>
      <div class="err" id="login-err"></div>
    </div>
  </section>

  <!-- ============== 로그인 후 공통 상단 ============== -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="brand">
        <span class="eyebrow">Mock Exam</span>
        <h1 id="topbar-title">모의고사</h1>
      </div>
      <div class="whoami">
        <b id="who-name"></b> 님
        <button class="logout" id="btn-logout">로그아웃</button>
      </div>
    </div>

    <!-- 홈: 회차 리스트 -->
    <section id="view-home">
      <div id="exam-list"></div>
      <div class="empty hidden" id="exam-empty">아직 공개된 회차가 없어요.</div>
    </section>

    <!-- 회차: 문제 번호 그리드 -->
    <section id="view-exam" class="hidden">
      <button class="back" id="back-to-home">← 회차 목록</button>
      <div id="exam-detail"></div>
    </section>

    <!-- 문제 + 해설 -->
    <section id="view-question" class="hidden">
      <button class="back" id="back-to-exam">← 문제 목록</button>
      <div class="card" id="question-detail"></div>
    </section>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
